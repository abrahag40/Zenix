name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: housekeeping_test
          POSTGRES_USER: housekeeping
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Pin npm 11 — el lockfile (lockfileVersion 3) lo genera el dev environment
      # con npm 11; Node 20 ships con npm 10 cuyo `ci` es estricto con campos que
      # npm 11 añade. Sin este pin, npm 10 reporta entries faltantes que en
      # realidad están presentes en formato nuevo.
      - name: Pin npm to 11.x
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      # Workspace renombrado @housekeeping/api → @zenix/api (legacy en main).
      - name: Generate Prisma client
        run: npm run db:generate --workspace=@zenix/api
        env:
          DATABASE_URL: postgresql://housekeeping:testpassword@localhost:5432/housekeeping_test

      - name: Run migrations
        run: npm run db:migrate:deploy --workspace=@zenix/api
        env:
          DATABASE_URL: postgresql://housekeeping:testpassword@localhost:5432/housekeeping_test

      # Seed BD para tests de integración. 3 scripts encadenados —
      # specs explícitamente declaran sus pre-requisites:
      #   - seed.ts:                 seed-org-1, properties, rooms, users
      #   - seed-nova-foundation.ts: nova-foundation.spec.ts + rbac-integration
      #   - seed-channex-rate-plans: channex-crud-schema.spec.ts (5 mappings)
      # Sin estos los e2e fallan con findFirstOrThrow / PrismaClientKnownRequestError.
      - name: Seed test database (base + nova + channex sandbox)
        run: |
          cd apps/api
          npx ts-node -r tsconfig-paths/register prisma/seed.ts
          npx ts-node -r tsconfig-paths/register prisma/scripts/seed-nova-foundation.ts
          npx ts-node -r tsconfig-paths/register prisma/scripts/seed-channex-rate-plans.ts
        env:
          DATABASE_URL: postgresql://housekeeping:testpassword@localhost:5432/housekeeping_test

      # CI-RESCUE residual cerrado 2026-06-06:
      #   · Lint: ✅ blocking (desde 2026-05-15).
      #   · Test: ✅ BLOCKING. Última deuda residual cerrada:
      #     - channex-crud.gateway.spec: `jest.spyOn(global, 'fetch')` →
      #       asignación directa en globalThis (Node 16 no expone fetch)
      #     - subscription.service: bare `crypto.randomUUID()` → import
      #       explícito de 'node:crypto' (Node 16 sin global crypto)
      #     - jest.setup.js polyfill `globalThis.crypto = webcrypto` para
      #       que @nestjs/schedule (SchedulerOrchestrator.addCron) funcione
      #       en Node 16 jest env — afectaba tenant-isolation y todo test
      #       que importara módulos con cron decorators.
      #     - --runInBand evita resource contention DB en CI single-node
      #       (channex-management.spec falla intermitente en paralelo).
      - name: Lint
        run: npx turbo lint

      # --testPathIgnorePatterns excluye 2 specs Channex que requieren
      # Channex sandbox infrastructure (UUIDs en env vars + sandbox property
      # con room types Twin/Double + 5 rate plans pre-creados). Análogos a
      # cert Tests 2-8 (§148) ya marcados `describe.skip`. Corren en local
      # cuando dev tiene .env con CHANNEX_SANDBOX_* configurado. Quedarán
      # cubiertos cuando se ejecute Channex Stage 4 walkthrough (§148):
      #   - channex-crud-schema.spec.ts
      #   - channex-management/channex-management.spec.ts
      - name: Test
        run: npx turbo test -- --runInBand --testPathIgnorePatterns="channex-crud-schema" --testPathIgnorePatterns="channex-management/channex-management"
        env:
          DATABASE_URL: postgresql://housekeeping:testpassword@localhost:5432/housekeeping_test
          JWT_SECRET: test-secret-not-for-production
          JWT_EXPIRES_IN: 1h
          NODE_ENV: test
